<script>
        async function updateStatus() {
            try {
                // This line is the only bridge you need
                const response = await fetch('/api/status');
                const data = await response.json();
                
                const text = document.getElementById('status-text');
                if (data.online) {
                    text.innerText = `ONLINE: ${data.players.online} Trainers Active`;
                    text.style.color = "green";
                } else {
                    text.innerText = 'OFFLINE: Server is currently down.';
                    text.style.color = "red";
                }
            } catch (error) {
                console.error("Error:", error);
                document.getElementById('status-text').innerText = 'Error connecting...';
            }
        }
        updateStatus();
    </script>
</body>
