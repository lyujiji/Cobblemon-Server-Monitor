<body>
    <h1>Cobblemon Server</h1>
    
    <div id="status-container">
        <span id="status-text">Checking...</span>
    </div>

    <script>
        async function updateStatus() {
            try {
                const response = await fetch('/api/status');
                const data = await response.json();
                
                // This line matches the ID "status-text" above
                const text = document.getElementById('status-text');
                
                if (data.online) {
                    text.innerText = `ONLINE: ${data.players.online} Trainers Active`;
                    text.style.color = "green";
                } else {
                    text.innerText = 'OFFLINE: Server is currently down.';
                    text.style.color = "red";
                }
            } catch (error) {
                document.getElementById('status-text').innerText = 'Error connecting to API.';
            }
        }
        updateStatus();
    </script>
</body>
