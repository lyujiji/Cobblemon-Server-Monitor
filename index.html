<script>
    fetch('/api/status')
        .then(res => res.json())
        .then(data => {
            const el = document.getElementById('server-status');
            if (data.online) {
                el.innerHTML = `Online (${data.players}/${data.max})`;
                el.style.color = "#4caf50";
            } else {
                el.innerHTML = "Offline";
                el.style.color = "#f44336";
            }
        });
</script>
